<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AD Mérida | Información</title>
    <link rel="icon" type="image/svg+xml"
        href="https://upload.wikimedia.org/wikipedia/commons/b/b5/Logo_AD_M%C3%A9rida.svg">
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0d141e;
            /* Flashscore dark background */
            --bg-header: #020b12;
            /* Darker header */
            --bg-card: #15202b;
            /* Primary container bg */
            --bg-hover: #1e2d3b;
            /* Hover state */
            --text-primary: #ffffff;
            /* Main text */
            --text-secondary: #9aa8b8;
            /* Subtext */
            --accent-color: #ff3b40;
            /* Flashscore red accent */
            --border-color: #2b3947;
            /* Borders between rows */
            --win-color: #f7a600;
            /* Flashscore win text color / Merida gold */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: var(--bg-body);
        }

        /* HEADER SECTION */
        .header {
            background-color: var(--bg-header);
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--bg-body);
        }

        .header-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-right: 20px;
        }

        .header-title h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .header-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* TABS NAVIGATION */
        .tabs {
            display: flex;
            background-color: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab {
            padding: 15px 20px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            cursor: pointer;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
        }

        /* CONTENT AREA */
        .content {
            padding: 20px;
            background-color: var(--bg-body);
        }

        .tab-content {
            display: none;
            background-color: var(--bg-card);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* TABLE STYLES */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .table-header {
            background-color: var(--bg-hover);
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            text-align: left;
        }

        .table-header th {
            padding: 10px 15px;
            font-weight: 500;
        }

        .table-row {
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s ease;
            font-size: 14px;
        }

        .table-row:hover {
            background-color: var(--bg-hover);
        }

        .table-row td {
            padding: 12px 15px;
        }

        .score {
            font-weight: 700;
            color: var(--win-color);
            text-align: right;
            padding-right: 15px !important;
        }

        .date-col {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .team-name {
            font-weight: 500;
            display: flex;
            align-items: center;
        }

        /* SPECIFIC TAB COMPONENTS */
        .section-title {
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
        }

        .news-item {
            display: block;
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            text-decoration: none;
            color: var(--text-primary);
            transition: background-color 0.2s;
        }

        .news-item:hover {
            background-color: var(--bg-hover);
        }

        .news-title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .news-meta {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .sync-status {
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            padding: 20px;
        }

        /* FLASHSCORE MATCH ROW CLONE */
        .fs-match-row {
            display: flex;
            align-items: center;
            padding: 8px 15px;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s;
            font-size: 13px;
        }

        .fs-match-row:hover {
            background-color: var(--bg-hover);
            cursor: pointer;
        }

        .fs-match-date {
            width: 70px;
            color: var(--text-secondary);
            text-align: center;
            flex-shrink: 0;
            margin-right: 15px;
        }

        .fs-match-teams {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .fs-team {
            display: flex;
            align-items: center;
            color: var(--text-primary);
        }

        .fw-bold {
            font-weight: 700;
        }

        .fs-match-scores {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            margin-right: 20px;
        }

        .fs-score {
            font-weight: 700;
            color: var(--win-color);
        }

        .fs-match-badge {
            width: 24px;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
        }

        .badge {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            border-radius: 4px;
        }

        .badge-g {
            background-color: #00a651;
        }

        /* WIN */
        .badge-e {
            background-color: #f7a600;
        }

        /* DRAW */
        .badge-p {
            background-color: #ff3b40;
        }

        /* LOSS */

        .form-badge {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            margin-right: 4px;
        }

        .team-logo {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            vertical-align: middle;
            object-fit: contain;
        }

        .header-logo {
            width: 80px;
            height: 80px;
            margin-right: 20px;
            object-fit: contain;
        }


        /* MOBILE OPTIMIZATIONS */
        @media (max-width: 768px) {
            .container {
                margin: 0;
                width: 100%;
                border-radius: 0;
            }

            .content {
                padding: 10px;
            }

            .header {
                padding: 15px;
            }

            .header-logo {
                width: 50px;
                height: 50px;
                margin-right: 12px;
            }

            .header-title h1 {
                font-size: 18px;
                margin: 0;
            }

            .header-subtitle {
                font-size: 11px;
            }

            .fs-match-row {
                padding: 10px 8px;
            }

            .fs-match-date {
                width: 45px;
                font-size: 10px;
                margin-right: 8px;
            }

            .fs-match-teams {
                font-size: 12px;
            }

            .fs-score {
                font-size: 12px;
            }

            .table-header th,
            .table-row td {
                padding: 8px 6px;
                font-size: 11px;
            }

            /* Sticky columns for classification on mobile */
            .table-responsive table {
                min-width: 500px;
                /* Force minimum width to ensure horizontal scroll works as intended */
            }

            .table-responsive .date-col:first-child,
            .table-responsive .team-name {
                position: sticky;
                left: 0;
                background-color: var(--bg-card);
                z-index: 2;
            }

            .table-responsive .date-col:first-child {
                width: 30px;
            }

            .table-responsive .team-name {
                left: 30px;
                box-shadow: 2px 0 5px rgba(0, 0, 0, 0.2);
            }

            .table-header th:nth-child(1),
            .table-header th:nth-child(2) {
                position: sticky;
                left: 0;
                background-color: var(--bg-hover);
                z-index: 3;
            }

            .table-header th:nth-child(2) {
                left: 30px;
                box-shadow: 2px 0 5px rgba(0, 0, 0, 0.2);
            }

            .form-badge {
                width: 14px;
                height: 14px;
                line-height: 14px;
                font-size: 8px;
                margin-right: 1px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <img src="assets/logos/ad-merida.png"
             onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/b/b5/Logo_AD_M%C3%A9rida.svg'"
             alt="Mérida AD Logo" class="header-logo">
        <div class="header-title">
            <h1>AD Mérida</h1>
            <div class="header-subtitle">Estadio Romano José Fouto (Mérida)</div>
            <div class="header-subtitle">14 600 personas.</div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('resumen', this)">RESUMEN</div>
        <div class="tab" onclick="switchTab('noticias', this)">NOTICIAS</div>
        <div class="tab" onclick="switchTab('resultados', this)">RESULTADOS</div>
        <div class="tab" onclick="switchTab('partidos', this)">PARTIDOS</div>
        <div class="tab" onclick="switchTab('clasificacion', this)">CLASIFICACIÓN</div>
    </div>

    <div class="content">

        <div id="resumen" class="tab-content active">
            <div class="section-title">Últimos Resultados</div>
            <div id="resumen-container"></div>
        </div>

        <div id="noticias" class="tab-content">
            <div id="noticias-list"></div>
        </div>

        <div id="resultados" class="tab-content">
            <div class="section-title">🇪🇸 ESPAÑA: Primera Federación - Grupo 2</div>
            <div id="resultados-container"></div>
        </div>

        <div id="partidos" class="tab-content">
            <div class="section-title">Próximos Partidos</div>
            <div id="partidos-container"></div>
        </div>

        <div id="clasificacion" class="tab-content">
            <div class="section-title">Clasificación General</div>
            <div class="table-responsive">
                <table>
                    <tr class="table-header">
                        <th width="30">#</th>
                        <th>EQUIPO</th>
                        <th width="30" style="text-align:center">PJ</th>
                        <th width="30" style="text-align:center">G</th>
                        <th width="30" style="text-align:center">E</th>
                        <th width="30" style="text-align:center">P</th>
                        <th width="50" style="text-align:center">G</th>
                        <th width="40" style="text-align:center">DG</th>
                        <th width="40" style="text-align:center">PTS</th>
                        <th width="130" style="text-align:center">FORMA</th>
                    </tr>
                    <tbody id="clasificacion-table"></tbody>
                </table>
            </div>
        </div>

        <div class="sync-status" id="syncStatus">Sincronizando datos...</div>

    </div>

</div>

<script>
    function switchTab(tabId, element) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
    }

    const LOGO_MAP = {
        // --- Grupo 2 Primera Federación ---
        'tenerife':            'tenerife',
        'celta de vigo b':     'celta-de-vigo-b',
        'real madrid b':       'real-madrid-b',
        'zamora':              'zamora',
        'pontevedra':          'pontevedra',
        'barakaldo':           'barakaldo',
        'ponferradina':        'ponferradina',
        'unionistas':          'unionistas',
        'lugo':                'lugo',
        'ad merida':           'ad-merida',
        'ad mérida':           'ad-merida',
        'merida':              'ad-merida',
        'mérida':              'ad-merida',
        'arenas getxo':        'arenas-getxo',
        'athletic club b':     'athletic-club-b',
        'racing club ferrol':  'racing-club-ferrol',
        'real aviles':         'real-aviles',
        'real avilés':         'real-aviles',
        'ourense cf':          'ourense-cf',
        'cf talavera':         'cf-talavera',
        'guadalajara':         'guadalajara',
        'cacereno':            'cacereno',
        'cacereño':            'cacereno',
        'osasuna b':           'osasuna-b',
        'arenteiro':           'arenteiro',
    };

    function getTeamLogo(name) {
        if (!name) return '';
        const key = name.trim().toLowerCase();
        const slug = LOGO_MAP[key];
        return slug ? `assets/logos/${slug}.png` : '';
    }

    async function loadData() {
        try {
            const urls = [
                'data/resultados.json', 'data/partidos.json',
                'data/standings.json', 'data/news.json', 'data/metadata.json'
            ];
            const responses = await Promise.all(urls.map(u => fetch(u).catch(() => null)));

            const resultsData   = (await (responses[0]?.json() || { response: [] })).response;
            const partidosData  = (await (responses[1]?.json() || { response: [] })).response;
            const standingsData = await (responses[2]?.json() || { response: [] });
            const newsData      = await (responses[3]?.json() || []);
            const meta          = await (responses[4]?.json() || { last_updated: 'Desconocido' });

            renderMatches('resumen-container',    resultsData.slice(0, 10));
            renderMatches('resultados-container', resultsData);
            renderMatches('partidos-container',   partidosData);
            renderStandings(standingsData);
            renderNews(newsData);

            document.getElementById('syncStatus').innerText =
                'Última sincronización: ' + new Date(meta.last_updated).toLocaleString();
        } catch (e) {
            console.error(e);
            document.getElementById('syncStatus').innerText = 'Error cargando datos.';
        }
    }

    function renderMatches(containerId, data) {
        const container = document.getElementById(containerId);
        if (!data || data.length === 0) {
            container.innerHTML = `<div class="empty-state">No hay partidos disponibles</div>`;
            return;
        }
        container.innerHTML = data.map(m => {
            const parts = (m.dateStr || '').split(' ');
            const dateTop    = parts[0] || '';
            const dateBottom = parts[1] || '';

            let badgeHtml = '<div style="width:24px"></div>';
            if (m.score_home !== '' && m.score_away !== '' && m.score_home !== '-' && m.score_away !== '-') {
                const sh   = parseInt(m.score_home);
                const sa   = parseInt(m.score_away);
                const home = m.home.includes('Mérida');
                if (sh === sa)
                    badgeHtml = `<div class="badge badge-e"></div>`;
                else if ((home && sh > sa) || (!home && sa > sh))
                    badgeHtml = `<div class="badge badge-g"></div>`;
                else
                    badgeHtml = `<div class="badge badge-p"></div>`;
            }

            return `<div class="fs-match-row">
    <div class="fs-match-date">
        <div style="margin-bottom:4px">${dateTop}</div>
        <div style="color:var(--text-secondary)">${dateBottom}</div>
    </div>
    <div class="fs-match-teams">
        <div class="fs-team ${m.home.includes('Mérida') ? 'fw-bold' : ''}">
            <img class="team-logo" src="${getTeamLogo(m.home)}" onerror="this.style.display='none'">
            ${m.home}
        </div>
        <div class="fs-team ${m.away.includes('Mérida') ? 'fw-bold' : ''}">
            <img class="team-logo" src="${getTeamLogo(m.away)}" onerror="this.style.display='none'">
            ${m.away}
        </div>
    </div>
    <div class="fs-match-scores">
        <div class="fs-score">${m.score_home || '-'}</div>
        <div class="fs-score">${m.score_away || '-'}</div>
    </div>
    <div class="fs-match-badge">${badgeHtml}</div>
</div>`;
        }).join('');
    }

    function renderStandings(data) {
        const tbody = document.getElementById('clasificacion-table');
        if (!data?.response?.length) {
            tbody.innerHTML = `<tr><td colspan="10" class="empty-state">No hay datos de clasificación.</td></tr>`;
            return;
        }
        const standings = data.response[0].league.standings[0];
        tbody.innerHTML = standings.map(s => {
            const isMerida = s.team.id === 2501 || s.team.name.includes('Mérida');
            const st = s.stats || { pj:'-', g:'-', e:'-', p:'-', goals:'-', diff: s.goalsDiff };
            const formHtml = (s.form || []).map(f => {
                const cls = f === 'G' ? 'badge-g' : f === 'E' ? 'badge-e' : f === 'P' ? 'badge-p' : '';
                const bg  = cls ? '' : 'background-color:#555e6b;';
                return `<div class="form-badge ${cls}" style="${bg}">${f}</div>`;
            }).join('');
            return `<tr class="table-row${isMerida ? ' fw-bold' : ''}" style="${isMerida ? 'background-color:var(--bg-hover)' : ''}">
    <td class="date-col">${s.rank}.</td>
    <td class="team-name" style="${isMerida ? 'color:#fff' : ''}">
        <img class="team-logo" src="${getTeamLogo(s.team.name)}" onerror="this.style.display='none'">
        ${s.team.name}
    </td>
    <td style="text-align:center;color:var(--text-secondary)">${st.pj}</td>
    <td style="text-align:center;color:var(--text-secondary)">${st.g}</td>
    <td style="text-align:center;color:var(--text-secondary)">${st.e}</td>
    <td style="text-align:center;color:var(--text-secondary)">${st.p}</td>
    <td style="text-align:center;color:var(--text-secondary)">${st.goals}</td>
    <td style="text-align:center;color:var(--text-secondary)">${st.diff}</td>
    <td style="text-align:center;font-weight:bold;color:#fff">${s.points}</td>
    <td style="text-align:center"><div style="display:flex;flex-wrap:wrap;gap:2px;justify-content:center">${formHtml}</div></td>
</tr>`;
        }).join('');
    }

    function renderNews(data) {
        const container = document.getElementById('noticias-list');
        if (!data || data.length === 0) {
            container.innerHTML = `<div class="empty-state">No hay noticias recientes</div>`;
            return;
        }
        container.innerHTML = data.map(n => `<a href="${n.url}" target="_blank" class="news-item">
    <div class="news-meta">${n.source} &bull; ${n.date}</div>
    <div class="news-title">${n.title}</div>
</a>`).join('');
    }

    document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
