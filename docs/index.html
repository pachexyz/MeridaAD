<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AD Mérida | Flashscore Clone</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0d141e;      /* Flashscore dark background */
            --bg-header: #020b12;    /* Darker header */
            --bg-card: #15202b;      /* Primary container bg */
            --bg-hover: #1e2d3b;     /* Hover state */
            --text-primary: #ffffff; /* Main text */
            --text-secondary: #9aa8b8; /* Subtext */
            --accent-color: #ff3b40; /* Flashscore red accent */
            --border-color: #2b3947; /* Borders between rows */
            --win-color: #f7a600;    /* Flashscore win text color / Merida gold */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: var(--bg-body);
        }

        /* HEADER SECTION */
        .header {
            background-color: var(--bg-header);
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--bg-body);
        }
        
        .header-logo-bg {
            background-color: white;
            padding: 8px;
            border-radius: 8px;
            margin-right: 20px;
        }

        .header-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .header-details h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
        }
        
        .header-details h1 span {
            margin-left: 10px;
            color: var(--text-secondary);
            font-size: 20px;
        }

        .header-info {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* TABS NAVIGATION */
        .tabs {
            display: flex;
            background-color: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab {
            padding: 15px 20px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            cursor: pointer;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
        }

        /* CONTENT AREA */
        .content {
            padding: 20px;
            background-color: var(--bg-body);
        }

        .tab-content {
            display: none;
            background-color: var(--bg-card);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* TABLE STYLES */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        .table-header {
            background-color: var(--bg-hover);
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            text-align: left;
        }

        .table-header th {
            padding: 10px 15px;
            font-weight: 500;
        }

        .table-row {
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s ease;
            font-size: 14px;
        }

        .table-row:hover {
            background-color: var(--bg-hover);
        }

        .table-row td {
            padding: 12px 15px;
        }

        .score {
            font-weight: 700;
            color: var(--win-color);
            text-align: right;
            padding-right: 15px !important;
        }

        .date-col {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .team-name {
            font-weight: 500;
            display: flex;
            align-items: center;
        }

        /* SPECIFIC TAB COMPONENTS */
        .section-title {
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
        }

        .news-item {
            display: block;
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            text-decoration: none;
            color: var(--text-primary);
            transition: background-color 0.2s;
        }

        .news-item:hover {
            background-color: var(--bg-hover);
        }

        .news-title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .news-meta {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .sync-status {
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            padding: 20px;
        }

        /* FLASHSCORE MATCH ROW CLONE */
        .fs-match-row {
            display: flex;
            align-items: center;
            padding: 8px 15px;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s;
            font-size: 13px;
        }

        .fs-match-row:hover {
            background-color: var(--bg-hover);
            cursor: pointer;
        }

        .fs-match-date {
            width: 70px;
            color: var(--text-secondary);
            text-align: center;
            flex-shrink: 0;
            margin-right: 15px;
        }

        .fs-match-teams {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .fs-team {
            display: flex;
            align-items: center;
            color: var(--text-primary);
        }
        
        .fw-bold {
            font-weight: 700;
        }

        .fs-match-scores {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            margin-right: 20px;
        }

        .fs-score {
            font-weight: 700;
            color: var(--win-color);
        }

        .fs-match-badge {
            width: 24px;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
        }

        .badge {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            color: white;
        }

        .badge-g { background-color: #00a651; } /* WIN */
        .badge-e { background-color: #f7a600; } /* DRAW */
        .badge-p { background-color: #ff3b40; } /* LOSS */
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-logo-bg">
            <img src="https://static.flashscore.com/res/image/data/6Z63QdUH-zNF1SoyR.png" alt="Mérida AD Logo" class="header-logo">
        </div>
        <div class="header-details">
            <h1>AD Mérida <span>☆</span></h1>
            <div class="header-info">
                Estadio: <strong>Estadio Romano José Fouto (Mérida)</strong><br>
                Capacidad: <strong>14 600</strong>
            </div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('resumen', this)">RESUMEN</div>
        <div class="tab" onclick="switchTab('noticias', this)">NOTICIAS</div>
        <div class="tab" onclick="switchTab('resultados', this)">RESULTADOS</div>
        <div class="tab" onclick="switchTab('partidos', this)">PARTIDOS</div>
        <div class="tab" onclick="switchTab('clasificacion', this)">CLASIFICACIÓN</div>
    </div>

    <div class="content">
        <!-- RESUMEN TAB -->
        <div id="resumen" class="tab-content active">
            <div class="section-title">Últimos Resultados</div>
            <div id="resumen-container"></div>
        </div>

        <!-- NOTICIAS TAB -->
        <div id="noticias" class="tab-content">
            <div id="noticias-list"></div>
        </div>

        <!-- RESULTADOS TAB -->
        <div id="resultados" class="tab-content">
            <div class="section-title">🇪🇸 ESPAÑA: Primera Federación - Grupo 1</div>
            <div id="resultados-container"></div>
        </div>

        <!-- PARTIDOS TAB -->
        <div id="partidos" class="tab-content">
            <div class="section-title">Próximos Partidos</div>
            <div id="partidos-container"></div>
        </div>

        <!-- CLASIFICACION TAB -->
        <div id="clasificacion" class="tab-content">
            <div class="section-title">Clasificación General</div>
            <table>
                <tr class="table-header">
                    <th width="50">#</th>
                    <th>Equipo</th>
                    <th width="50">PTS</th>
                    <th width="50">DG</th>
                </tr>
                <tbody id="clasificacion-table"></tbody>
            </table>
        </div>
        
        <div class="sync-status" id="syncStatus">Sincronizando datos...</div>
    </div>
</div>

<script>
    function switchTab(tabId, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        el.classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }

    async function loadData() {
        try {
            const urls = [
                'data/resultados.json', 'data/partidos.json', 'data/standings.json',
                'data/news.json', 'data/metadata.json'
            ];
            const responses = await Promise.all(urls.map(u => fetch(u).catch(() => null)));
            
            const resultsData = (await (responses[0]?.json() || {response:[]})).response;
            const partidosData = (await (responses[1]?.json() || {response:[]})).response;
            const standingsData = await (responses[2]?.json() || {response:[]});
            const newsData = await (responses[3]?.json() || []);
            const meta = await (responses[4]?.json() || {last_updated: 'Desconocido'});

            renderMatches('resumen-container', resultsData.slice(0, 10)); // Top 10 for resumen
            renderMatches('resultados-container', resultsData);
            renderMatches('partidos-container', partidosData);
            renderStandings(standingsData);
            renderNews(newsData);

            document.getElementById('syncStatus').innerText = "Última sincronización: " + new Date(meta.last_updated).toLocaleString();
        } catch (e) {
            console.error(e);
            document.getElementById('syncStatus').innerText = "Error cargando datos. Visualizando caché / diseño base.";
        }
    }

    function renderMatches(containerId, data) {
        const container = document.getElementById(containerId);
        if (!data || data.length === 0) {
            container.innerHTML = `<div class="empty-state">No hay partidos disponibles</div>`;
            return;
        }
        
        container.innerHTML = data.map(m => {
            let formattedDate = m.dateStr || '';
            
            // Apilar fecha y hora como en la captura
            const dParts = formattedDate.split(" ");
            const dateTop = dParts[0] || '';
            const dateBottom = dParts[1] || '';

            let badgeHtml = '<div style="width: 24px;"></div>';
            if (m.score_home !== '' && m.score_away !== '' && m.score_home !== '-' && m.score_away !== '-') {
                const sHome = parseInt(m.score_home);
                const sAway = parseInt(m.score_away);
                const isMeridaHome = m.home.includes('Mérida');
                
                if (sHome === sAway) {
                    badgeHtml = `<div class="badge badge-e"></div>`;
                } else if ((isMeridaHome && sHome > sAway) || (!isMeridaHome && sAway > sHome)) {
                    badgeHtml = `<div class="badge badge-g"></div>`;
                } else {
                    badgeHtml = `<div class="badge badge-p"></div>`;
                }
            }

            return `
            <div class="fs-match-row">
                <div class="fs-match-date">
                    <div style="margin-bottom: 4px;">${dateTop}</div>
                    <div style="color: var(--text-secondary);">${dateBottom}</div>
                </div>
                <div class="fs-match-teams">
                    <div class="fs-team ${m.home.includes('Mérida') ? 'fw-bold' : ''}">
                        ${m.home}
                    </div>
                    <div class="fs-team ${m.away.includes('Mérida') ? 'fw-bold' : ''}">
                        ${m.away}
                    </div>
                </div>
                <div class="fs-match-scores">
                    <div class="fs-score">${m.score_home || '-'}</div>
                    <div class="fs-score">${m.score_away || '-'}</div>
                </div>
                <div class="fs-match-badge">
                    ${badgeHtml}
                </div>
            </div>
            `;
        }).join('');
    }

    function renderStandings(data) {
        const tbody = document.getElementById('clasificacion-table');
        const st = data?.response?.[0]?.league?.standings?.[0];
        if (!st || st.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="empty-state">No hay clasificación</td></tr>`;
            return;
        }

        tbody.innerHTML = st.map(s => `
            <tr class="table-row" style="${s.team.name.includes('Mérida') ? 'background-color: rgba(255, 59, 64, 0.1);' : ''}">
                <td>${s.rank}</td>
                <td class="team-name" style="${s.team.name.includes('Mérida') ? 'font-weight: bold; color: var(--accent-color);' : ''}">${s.team.name}</td>
                <td style="font-weight:700">${s.points}</td>
                <td class="date-col">${s.goalsDiff}</td>
            </tr>
        `).join('');
    }

    function renderNews(data) {
        const container = document.getElementById('noticias-list');
        if (!data || data.length === 0) {
            container.innerHTML = `<div class="empty-state">No hay noticias recientes</div>`;
            return;
        }
        container.innerHTML = data.map(n => `
            <a href="${n.url}" target="_blank" class="news-item">
                <div class="news-meta">${n.source} • ${n.date}</div>
                <div class="news-title">${n.title}</div>
            </a>
        `).join('');
    }

    // Load data on start
    document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
