<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AD Mérida | Dashboard Oficial</title>
    <meta name="description" content="Resultados, clasificación, noticias y plantilla del AD Mérida. Actualización automática cada 6 horas.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --grana: #B22222;
            --grana-dark: #8b0000;
            --oro: #D4AF37;
            --oro-light: #f1d37b;
            --dark: #0a0a0a;
            --surface: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
            --win: #22c55e;
            --draw: #eab308;
            --loss: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--dark);
            color: var(--text-main);
            font-family: 'Barlow', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        h1, h2, h3, .heading-font {
            font-family: 'Bebas Neue', cursive;
            letter-spacing: 1px;
        }

        /* Header */
        header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 2px solid var(--grana);
            position: relative;
        }

        .logo {
            font-size: 3rem;
            color: var(--oro);
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px rgba(178, 34, 34, 0.5);
        }

        .header-info {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Nav */
        nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 1rem;
            position: sticky;
            top: 0;
            background: var(--dark);
            z-index: 100;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            padding: 0.5rem 1rem;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }

        nav a:hover, nav a.active {
            color: var(--oro);
            border-bottom-color: var(--oro);
        }

        /* Container */
        main {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        section {
            margin-bottom: 4rem;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease-out;
        }

        section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section-title {
            font-size: 2.5rem;
            color: var(--oro);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .section-title::after {
            content: '';
            flex-grow: 1;
            height: 2px;
            background: linear-gradient(to right, var(--grana), transparent);
        }

        /* Partidos */
        .fixtures-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .fixture-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid var(--text-dim);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
        }

        .fixture-card.win { border-left-color: var(--win); }
        .fixture-card.draw { border-left-color: var(--draw); }
        .fixture-card.loss { border-left-color: var(--loss); }

        .fixture-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .fixture-body {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .score {
            font-size: 1.5rem;
            font-family: 'Bebas Neue', cursive;
            background: rgba(255,255,255,0.05);
            padding: 0.2rem 0.8rem;
            border-radius: 4px;
        }

        /* Clasificación */
        .table-container {
            overflow-x: auto;
            background: var(--surface);
            border-radius: 8px;
            padding: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            color: var(--oro);
            font-family: 'Bebas Neue', cursive;
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        tr.highlight {
            background: rgba(178, 34, 34, 0.2);
            border-left: 3px solid var(--oro);
        }

        .zone-ascenso { background: rgba(34, 197, 94, 0.1); }
        .zone-playoff { background: rgba(234, 179, 8, 0.1); }
        .zone-descenso { background: rgba(239, 68, 68, 0.1); }

        /* Noticias */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .news-card {
            background: var(--surface);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s;
        }

        .news-card:hover {
            transform: translateY(-5px);
            border-color: var(--oro);
        }

        .news-content {
            padding: 1.5rem;
        }

        .news-tag {
            background: var(--grana);
            color: white;
            font-size: 0.6rem;
            padding: 0.2rem 0.5rem;
            border-radius: 2px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .news-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-main);
        }

        /* Plantilla */
        .squad-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .position-label {
            grid-column: 1 / -1;
            font-family: 'Bebas Neue';
            color: var(--oro);
            border-bottom: 1px solid var(--grana);
            margin-top: 1rem;
        }

        .player-card {
            background: var(--surface);
            padding: 1rem;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .player-number {
            font-family: 'Bebas Neue';
            font-size: 1.5rem;
            color: var(--oro);
            width: 30px;
        }

        .player-info h4 { font-size: 0.9rem; }
        .player-info p { font-size: 0.7rem; color: var(--text-dim); }

        footer {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 600px) {
            .section-title { font-size: 1.8rem; }
            nav a { font-size: 1rem; padding: 0.5rem 0.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">AD MÉRIDA</div>
        <p class="header-info" id="last-updated">Cargando actualización...</p>
    </header>

    <nav>
        <a href="#partidos">Partidos</a>
        <a href="#clasificacion">Clasificación</a>
        <a href="#noticias">Noticias</a>
        <a href="#plantilla">Plantilla</a>
    </nav>

    <main>
        <section id="partidos">
            <h2 class="section-title">Resultados y Próximos</h2>
            <div class="fixtures-grid" id="fixtures-container">
                <!-- JS Inject -->
            </div>
        </section>

        <section id="clasificacion">
            <h2 class="section-title">Clasificación</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>POS</th>
                            <th>EQUIPO</th>
                            <th>PTS</th>
                            <th>DG</th>
                        </tr>
                    </thead>
                    <tbody id="standings-body">
                        <!-- JS Inject -->
                    </tbody>
                </table>
            </div>
        </section>

        <section id="noticias">
            <h2 class="section-title">Últimas Noticias</h2>
            <div class="news-grid" id="news-container">
                <!-- JS Inject -->
            </div>
        </section>

        <section id="plantilla">
            <h2 class="section-title">Plantilla 25/26</h2>
            <div id="squad-container">
                <!-- JS Inject -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Dashboard AD Mérida - Información no oficial</p>
        <p>Datos proporcionados por API-Football v3</p>
    </footer>

    <script>
        async function loadData() {
            try {
                const [fixtures, standings, news, players, metadata] = await Promise.all([
                    fetch('data/fixtures.json').then(r => r.json()),
                    fetch('data/standings.json').then(r => r.json()),
                    fetch('data/news.json').then(r => r.json()),
                    fetch('data/players.json').then(r => r.json()),
                    fetch('data/metadata.json').then(r => r.json())
                ]);

                renderMetadata(metadata);
                renderFixtures(fixtures.response);
                renderStandings(standings.response[0].league.standings[0]);
                renderNews(news);
                renderSquad(players.response);

            } catch (err) {
                console.error("Error cargando los datos:", err);
                document.getElementById('last-updated').textContent = "Error al sincronizar datos";
            }
        }

        function renderMetadata(meta) {
            const date = new Date(meta.last_updated);
            document.getElementById('last-updated').textContent = `Sincronizado: ${date.toLocaleString('es-ES')}`;
        }

        function renderFixtures(data) {
            const container = document.getElementById('fixtures-container');
            container.innerHTML = data.map(f => {
                const isMeridaHome = f.teams.home.name.includes("Mérida");
                const goalsH = f.goals.home;
                const goalsA = f.goals.away;
                
                let resultClass = "";
                if (f.fixture.status.short === "FT") {
                    const meridaWon = (isMeridaHome && f.teams.home.winner) || (!isMeridaHome && f.teams.away.winner);
                    const draw = goalsH === goalsA;
                    resultClass = draw ? "draw" : (meridaWon ? "win" : "loss");
                }

                return `
                <div class="fixture-card ${resultClass}">
                    <div class="fixture-header">
                        <span>${new Date(f.fixture.date).toLocaleDateString('es-ES')}</span>
                    </div>
                    <div class="fixture-body">
                        <span>${f.teams.home.name}</span>
                        <span class="score">${goalsH !== null ? goalsH : '-'} : ${goalsA !== null ? goalsA : '-'}</span>
                        <span>${f.teams.away.name}</span>
                    </div>
                </div>
                `;
            }).join('');
        }

        function renderStandings(standings) {
            const body = document.getElementById('standings-body');
            body.innerHTML = standings.map(s => {
                const isMerida = s.team.name.includes("Mérida") || s.team.id === 2501;
                let zoneClass = "";
                if (s.rank === 1) zoneClass = "zone-ascenso";
                else if (s.rank <= 5) zoneClass = "zone-playoff";
                else if (s.rank >= 16) zoneClass = "zone-descenso";

                return `
                <tr class="${isMerida ? 'highlight' : ''} ${zoneClass}">
                    <td>${s.rank}</td>
                    <td><strong>${s.team.name}</strong></td>
                    <td>${s.points}</td>
                    <td>${s.goalsDiff}</td>
                </tr>
                `;
            }).join('');
        }

        function renderNews(news) {
            const container = document.getElementById('news-container');
            container.innerHTML = news.map(n => `
                <div class="news-card">
                    <div class="news-content">
                        <span class="news-tag">${n.source}</span>
                        <h3 class="news-title">${n.title}</h3>
                        <p style="font-size:0.8rem; color:var(--text-dim)">${n.date}</p>
                    </div>
                </div>
            `).join('');
        }

        function renderSquad(players) {
            const container = document.getElementById('squad-container');
            const positions = ["Goalkeeper", "Defender", "Midfielder", "Forward"];
            const labels = {
                "Goalkeeper": "Porteros",
                "Defender": "Defensas",
                "Midfielder": "Centrocampistas",
                "Forward": "Delanteros"
            };

            let html = "";
            positions.forEach(pos => {
                const filtered = players.filter(p => p.player.pos === pos || p.player.position === pos);
                if (filtered.length > 0) {
                    html += `<h3 class="position-label">${labels[pos]}</h3><div class="squad-section">`;
                    html += filtered.map(p => `
                        <div class="player-card">
                            <div class="player-number">${p.player.number || '--'}</div>
                            <div class="player-info">
                                <h4>${p.player.name}</h4>
                                <p>${p.player.age} años</p>
                            </div>
                        </div>
                    `).join('');
                    html += `</div>`;
                }
            });
            container.innerHTML = html;
        }

        // Animation on scroll
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('section').forEach(section => {
            observer.observe(section);
        });

        loadData();
    </script>
</body>
</html>
