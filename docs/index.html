<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AD Mérida | Resultados</title>
    <link rel="icon" type="image/png" href="assets/logos/ad-merida.png">
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0d141e;
            /* Dark background */
            --bg-header: #020b12;
            /* Darker header */
            --bg-card: #15202b;
            /* Primary container bg */
            --bg-hover: #1e2d3b;
            /* Hover state */
            --text-primary: #ffffff;
            /* Main text */
            --text-secondary: #9aa8b8;
            /* Subtext */
            --accent-color: #ff3b40;
            /* Flashscore red accent */
            --border-color: #2b3947;
            /* Borders between rows */
            --win-color: #f7a600;
            /* Win text color / Merida gold */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: var(--bg-body);
        }

        /* HEADER SECTION */
        .header {
            background-color: var(--bg-header);
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--bg-body);
        }

        .header-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-right: 20px;
        }

        .header-title h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .header-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* TABS NAVIGATION */
        .tabs {
            display: flex;
            background-color: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab {
            padding: 15px 20px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            cursor: pointer;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
        }

        /* CONTENT AREA */
        .content {
            padding: 20px;
            background-color: var(--bg-body);
        }

        .tab-content {
            display: none;
            background-color: var(--bg-card);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* TABLE STYLES */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .table-header {
            background-color: var(--bg-hover);
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            text-align: left;
        }

        .table-header th {
            padding: 10px 15px;
            font-weight: 500;
        }

        .table-row {
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s ease;
            font-size: 14px;
        }

        .table-row:hover {
            background-color: var(--bg-hover);
        }

        .table-row td {
            padding: 12px 15px;
        }

        .score {
            font-weight: 700;
            color: var(--win-color);
            text-align: right;
            padding-right: 15px !important;
        }

        .date-col {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .team-name {
            font-weight: 500;
            display: flex;
            align-items: center;
        }

        /* SPECIFIC TAB COMPONENTS */
        .section-title {
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
        }


        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .footer {
            text-align: center;
            padding: 25px 20px;
            color: var(--text-secondary);
            font-size: 13px;
            border-top: 1px solid var(--border-color);
            margin-top: 10px;
        }

        .footer-sync {
            margin-bottom: 12px;
        }

        .footer-sync span {
            color: var(--text-primary);
            font-weight: 500;
        }

        .footer-meta {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .footer-meta a {
            color: #fff;
            text-decoration: none;
            background-color: var(--bg-hover);
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
        }

        .footer-meta a:hover {
            background-color: var(--border-color);
            color: var(--win-color);
        }
        
        .footer-meta svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* MATCH ROW CLONE */
        .fs-match-row {
            display: flex;
            align-items: stretch;
            padding: 4px;
            margin: 8px 10px;
            border-radius: 6px;
            transition: filter 0.2s;
            font-size: 13px;
        }

        .fs-match-row:last-child {
            margin-bottom: 8px;
        }

        .fs-match-row:hover {
            filter: brightness(1.1);
            cursor: pointer;
        }

        .match-g { background-color: #00a651; }
        .match-e { background-color: #f7a600; }
        .match-p { background-color: #ff3b40; }
        
        .match-default { 
            background-color: transparent; 
            border-bottom: 1px solid var(--border-color); 
            border-radius: 0; 
            margin: 0;
            padding: 8px 0;
        }

        .match-box {
            background-color: rgba(0, 0, 0, 0.55);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .match-default .match-box {
            background-color: transparent;
        }

        .fs-match-date {
            width: 70px;
            color: rgba(255, 255, 255, 0.95);
            align-items: center;
            flex-shrink: 0;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .match-default .fs-match-date {
            color: var(--text-secondary);
        }

        .fs-match-teams {
            flex-grow: 1;
            margin: 0 4px;
            padding: 8px 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .match-default .fs-match-teams {
            justify-content: flex-start;
            margin: 0;
            padding: 4px 15px;
        }

        .teams-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .fs-team {
            display: flex;
            align-items: center;
            color: var(--text-primary);
        }

        .fw-bold {
            font-weight: 700;
        }

        .fs-match-scores {
            width: 45px;
            align-items: center;
            flex-shrink: 0;
            gap: 6px;
            padding: 8px 0;
        }

        .fs-score {
            font-weight: 700;
            color: #fff;
            text-align: center;
        }
        
        .match-default .fs-score {
            color: var(--text-primary);
        }
        .form-badge {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            margin-right: 4px;
        }
        
        .badge-g { background-color: #00a651; }
        .badge-e { background-color: #f7a600; }
        .badge-p { background-color: #ff3b40; }

        .rank-box {
            display: inline-block;
            min-width: 24px;
            height: 24px;
            line-height: 24px;
            text-align: center;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            padding: 0 4px;
        }

        .rank-blue { background-color: #00529f; color: #fff; }
        .rank-green { background-color: #00a651; color: #fff; }
        .rank-red { background-color: #ff3b40; color: #fff; }

        .team-logo {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            vertical-align: middle;
            object-fit: contain;
        }

        .header-logo {
            width: 80px;
            height: 80px;
            margin-right: 20px;
            object-fit: contain;
        }


        /* MOBILE OPTIMIZATIONS */
        @media (max-width: 768px) {
            .container {
                margin: 0;
                width: 100%;
                border-radius: 0;
            }

            .content {
                padding: 10px;
            }

            .header {
                padding: 15px;
            }

            .header-logo {
                width: 50px;
                height: 50px;
                margin-right: 12px;
            }

            .header-title h1 {
                font-size: 18px;
                margin: 0;
            }

            .header-subtitle {
                font-size: 11px;
            }

            .fs-match-row {
                margin: 6px 4px;
                padding: 3px;
                border-radius: 4px;
            }

            .match-default {
                margin: 0;
                padding: 6px 0;
                border-radius: 0;
            }

            .fs-match-date {
                width: 45px;
                font-size: 10px;
                letter-spacing: 0;
            }

            .fs-match-teams {
                font-size: 11px;
                padding: 6px 4px;
                margin: 0 2px;
            }

            .fs-match-scores {
                width: 30px;
                font-size: 12px;
            }

            .table-header th,
            .table-row td {
                padding: 8px 6px;
                font-size: 11px;
            }

            /* Sticky columns for classification on mobile */
            .table-responsive table {
                min-width: 500px;
                /* Force minimum width to ensure horizontal scroll works as intended */
            }

            .table-responsive .date-col:first-child,
            .table-responsive .team-name {
                position: sticky;
                left: 0;
                background-color: var(--bg-card);
                z-index: 2;
            }

            .table-responsive .date-col:first-child {
                width: 30px;
            }

            .table-responsive .team-name {
                left: 30px;
                box-shadow: 2px 0 5px rgba(0, 0, 0, 0.2);
            }

            .table-header th:nth-child(1),
            .table-header th:nth-child(2) {
                position: sticky;
                left: 0;
                background-color: var(--bg-hover);
                z-index: 3;
            }

            .table-header th:nth-child(2) {
                left: 30px;
                box-shadow: 2px 0 5px rgba(0, 0, 0, 0.2);
            }

            .form-badge {
                width: 14px;
                height: 14px;
                line-height: 14px;
                font-size: 8px;
                margin-right: 1px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header">
        <img src="assets/logos/ad-merida-hd.png"
             onerror="this.src='https://static.flashscore.com/res/image/data/8EuV22Wg-zNF1SoyR.png'"
             alt="Mérida AD Logo" class="header-logo">
            <div class="header-title">
                <h1>AD Mérida</h1>
                <div class="header-subtitle">Estadio Romano José Fouto (Mérida)</div>
                <div class="header-subtitle">14.600 personas.</div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('resultados', this)">ÚLTIMOS RESULTADOS</div>
            <div class="tab" onclick="switchTab('partidos', this)">PRÓXIMOS PARTIDOS</div>
            <div class="tab" onclick="switchTab('clasificacion', this)">CLASIFICACIÓN</div>
        </div>

        <div class="content">

            <div id="resultados" class="tab-content active">
                <div class="section-title">Últimos Resultados</div>
                <div id="resultados-container"></div>
            </div>

            <div id="partidos" class="tab-content">
                <div class="section-title">Próximos Partidos</div>
                <div id="partidos-container"></div>
            </div>

            <div id="clasificacion" class="tab-content">
                <div class="section-title">Clasificación General</div>
                <div class="table-responsive">
                    <table>
                        <tr class="table-header">
                            <th width="30">#</th>
                            <th>EQUIPO</th>
                            <th width="30" style="text-align:center">PJ</th>
                            <th width="30" style="text-align:center">G</th>
                            <th width="30" style="text-align:center">E</th>
                            <th width="30" style="text-align:center">P</th>
                            <th width="50" style="text-align:center">G</th>
                            <th width="40" style="text-align:center">DG</th>
                            <th width="40" style="text-align:center">PTS</th>
                            <th width="130" style="text-align:center">FORMA</th>
                        </tr>
                        <tbody id="clasificacion-table"></tbody>
                    </table>
                </div>
            </div>

            <div class="footer">
                <div class="footer-sync" id="syncStatus">Sincronizando datos...</div>
                <div class="footer-meta">
                    <span>🔄 Frecuencia de actualización: <strong>Cada 2 horas</strong></span>
                    <span style="color:var(--border-color)">|</span>
                    <a href="https://github.com/MCPab" target="_blank" rel="noopener">

                        Creado por MCPab
                    </a>
                </div>
            </div>

        </div>

    </div>

    <script>
    function switchTab(tabId, element) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
    }

    const LOGO_MAP = {
        'tenerife':           'tenerife',
        'celta de vigo b':    'celta-de-vigo-b',
        'real madrid b':      'real-madrid-b',
        'zamora':             'zamora',
        'pontevedra':         'pontevedra',
        'barakaldo':          'barakaldo',
        'ponferradina':       'ponferradina',
        'unionistas':         'unionistas',
        'lugo':               'lugo',
        'ad mérida':     'ad-merida',
        'ad merida':          'ad-merida',
        'mérida':        'ad-merida',
        'merida':             'ad-merida',
        'arenas getxo':       'arenas-getxo',
        'athletic club b':    'athletic-club-b',
        'racing club ferrol': 'racing-club-ferrol',
        'real avilés':   'real-aviles',
        'real aviles':        'real-aviles',
        'ourense cf':         'ourense-cf',
        'cf talavera':        'cf-talavera',
        'guadalajara':        'guadalajara',
        'cacereño':      'cacereno',
        'cacereno':           'cacereno',
        'osasuna b':          'osasuna-b',
        'arenteiro':          'arenteiro',
    };

    function getTeamLogo(name) {
        if (!name) return null;
        const key = name.trim().toLowerCase();
        const slug = LOGO_MAP[key];
        return slug ? 'assets/logos/' + slug + '.png' : null;
    }

    function logoImg(name) {
        const src = getTeamLogo(name);
        if (!src) return '';
        return '<img src="' + src + '" width="18" height="18" onerror="this.style.display=\'none\'" style="margin-right:8px;object-fit:contain;vertical-align:middle">';
    }

    async function loadData() {
        try {
            const urls = [
                'data/resultados.json', 'data/partidos.json',
                'data/standings.json', 'data/metadata.json'
            ];
            const responses = await Promise.all(urls.map(u => fetch(u).catch(() => null)));

            const resultsData   = (await (responses[0]?.json() || { response: [] })).response;
            const partidosData  = (await (responses[1]?.json() || { response: [] })).response;
            const standingsData = await (responses[2]?.json() || { response: [] });
            const meta          = await (responses[3]?.json() || { last_updated: 'Desconocido' });

            renderMatches('resultados-container', resultsData);
            renderMatches('partidos-container',   partidosData);
            renderStandings(standingsData);

            document.getElementById('syncStatus').innerHTML =
                'Última sincronización: <span>' + new Date(meta.last_updated).toLocaleString() + '</span>';
        } catch (e) {
            console.error(e);
            document.getElementById('syncStatus').innerText = 'Error cargando datos.';
        }
    }

    function renderMatches(containerId, data) {
        const container = document.getElementById(containerId);
        if (!data || data.length === 0) {
            container.innerHTML = '<div class="empty-state">No hay partidos disponibles</div>';
            return;
        }
        let html = '';
        data.forEach(function(m) {
            const parts = (m.dateStr || '').split(' ');
            let dateTop = parts[0] || '';
            const dateSegments = dateTop.split('.');
            if (dateSegments.length >= 2) {
                dateTop = dateSegments[0] + '/' + dateSegments[1];
            }

            let resultClass = 'match-default';
            if (m.score_home !== '' && m.score_away !== '' && m.score_home !== '-' && m.score_away !== '-') {
                const sh   = parseInt(m.score_home);
                const sa   = parseInt(m.score_away);
                const home = m.home.includes('Mérida') || m.home.includes('Merida');
                if (sh === sa)
                    resultClass = 'match-e';
                else if ((home && sh > sa) || (!home && sa > sh))
                    resultClass = 'match-g';
                else
                    resultClass = 'match-p';
            }

            const isMeridaHome = m.home.includes('Mérida') || m.home.includes('Merida');
            const isMeridaAway = m.away.includes('Mérida') || m.away.includes('Merida');

            html += '<div class="fs-match-row ' + resultClass + '">'
                + '<div class="match-box fs-match-date">'
                + '<div>' + dateTop + '</div>'
                + '</div>'
                + '<div class="match-box fs-match-teams">'
                + '<div class="teams-wrapper">'
                + '<div class="fs-team' + (isMeridaHome ? ' fw-bold' : '') + '">'
                + logoImg(m.home)
                + m.home
                + '</div>'
                + '<div class="fs-team' + (isMeridaAway ? ' fw-bold' : '') + '">'
                + logoImg(m.away)
                + m.away
                + '</div>'
                + '</div>'
                + '</div>'
                + '<div class="match-box fs-match-scores">'
                + '<div class="fs-score">' + (m.score_home !== '' ? m.score_home : '-') + '</div>'
                + '<div class="fs-score">' + (m.score_away !== '' ? m.score_away : '-') + '</div>'
                + '</div>'
                + '</div>';
        });
        container.innerHTML = html;
    }

    function renderStandings(data) {
        const tbody = document.getElementById('clasificacion-table');
        if (!data || !data.response || !data.response.length) {
            tbody.innerHTML = '<tr><td colspan="10" class="empty-state">No hay datos de clasificación.</td></tr>';
            return;
        }
        const standings = data.response[0].league.standings[0];
        const totalTeams = standings.length;
        let rows = '';
        standings.forEach(function(s) {
            const isMerida = s.team.id === 2501 || s.team.name.includes('Mérida') || s.team.name.includes('Merida');
            const st = s.stats || { pj: '-', g: '-', e: '-', p: '-', goals: '-', diff: s.goalsDiff };
            let formHtml = '';
            (s.form || []).forEach(function(f) {
                const cls = f === 'G' ? 'badge-g' : f === 'E' ? 'badge-e' : f === 'P' ? 'badge-p' : '';
                const bg  = cls ? '' : 'background-color:#555e6b;';
                formHtml += '<div class="form-badge ' + cls + '" style="' + bg + '">' + f + '</div>';
            });
            
            let rankClass = '';
            if (s.rank === 1) rankClass = 'rank-blue';
            else if (s.rank >= 2 && s.rank <= 5) rankClass = 'rank-green';
            else if (s.rank >= totalTeams - 4) rankClass = 'rank-red';

            let rankHtml = s.rank + '.';
            if (rankClass) {
                rankHtml = '<span class="rank-box ' + rankClass + '">' + rankHtml + '</span>';
            }

            rows += '<tr class="table-row' + (isMerida ? ' fw-bold' : '') + '" style="' + (isMerida ? 'background-color:var(--bg-hover)' : '') + '">'
                + '<td class="date-col" style="text-align:center;">' + rankHtml + '</td>'
                + '<td class="team-name" style="' + (isMerida ? 'color:#fff' : '') + '">'
                + logoImg(s.team.name)
                + s.team.name
                + '</td>'
                + '<td style="text-align:center;color:var(--text-secondary)">' + st.pj + '</td>'
                + '<td style="text-align:center;color:var(--text-secondary)">' + st.g + '</td>'
                + '<td style="text-align:center;color:var(--text-secondary)">' + st.e + '</td>'
                + '<td style="text-align:center;color:var(--text-secondary)">' + st.p + '</td>'
                + '<td style="text-align:center;color:var(--text-secondary)">' + st.goals + '</td>'
                + '<td style="text-align:center;color:var(--text-secondary)">' + st.diff + '</td>'
                + '<td style="text-align:center;font-weight:bold;color:#fff">' + s.points + '</td>'
                + '<td style="text-align:center"><div style="display:flex;flex-wrap:wrap;gap:2px;justify-content:center">' + formHtml + '</div></td>'
                + '</tr>';
        });
        tbody.innerHTML = rows;
    }



    document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
